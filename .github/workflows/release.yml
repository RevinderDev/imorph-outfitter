name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: ver
        run: |
          v=$(cat VERSION)
          # strip whitespace/newlines
          v="$(echo "$v" | tr -d '[:space:]')"
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          tag="v${{ steps.ver.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.check.outputs.exists == 'false'
        id: tag
        run: |
          tag="v${{ steps.ver.outputs.version }}"
          git tag "$tag"
          git push origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build zip
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p iMorphOutfits
          cp *.lua iMorphOutfits.toc iMorphOutfits/
          zip -r iMorphOutfits-${{ steps.ver.outputs.version }}.zip iMorphOutfits

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check.outputs.tag }}
          name: ${{ steps.check.outputs.tag }}
          generate_release_notes: true
          files: iMorphOutfits-${{ steps.ver.outputs.version }}.zip
