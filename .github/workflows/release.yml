name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: ver
        run: |
          v=$(cat VERSION)
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Bump patch version
        id: bump
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.ver.outputs.version }}"
          patch=$((patch + 1))
          new="$major.$minor.$patch"
          echo "new=$new" >> "$GITHUB_OUTPUT"
          printf '%s' "$new" > VERSION

      - name: Update Version in .toc
        run: |
          sed -i "s/^## Version:.*/## Version: ${{ steps.bump.outputs.new }}/" iMorphOutfits.toc

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION iMorphOutfits.toc
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new }}" || exit 0
          git push

      - name: Create tag
        id: tag
        run: |
          tag="v${{ steps.bump.outputs.new }}"
          git tag "$tag"
          git push origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build zip
        run: |
          mkdir -p iMorphOutfits
          cp *.lua iMorphOutfits.toc iMorphOutfits/
          zip -r iMorphOutfits-${{ steps.bump.outputs.new }}.zip iMorphOutfits

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: iMorphOutfits-${{ steps.bump.outputs.new }}.zip
